<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아이 위치 관제 시스템</title>

    <!-- 카카오맵 및 파이어베이스 라이브러리 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=065ad8c378bbf19cc65c8fdf44a81d4d"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 1. 폰트 설정 */
        @font-face {
            font-family: 'NexonLv2Gothic';
            src: url('NexonLv2Gothic_2.ttf') format('truetype');
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'NexonLv2Gothic', sans-serif; overflow: hidden;
        }

        /* 2. 상단 제어 바 (웹/모바일 공통 1줄 고정) */
        #control-bar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.75); color: white;
            display: flex; align-items: center; justify-content: flex-start;
            padding: 10px; gap: 8px; 
            flex-wrap: nowrap; /* 절대 줄바꿈 하지 않음 */
            overflow-x: auto; /* 화면이 좁으면 좌우 스크롤 허용 */
            white-space: nowrap; /* 내부 텍스트 쪼개짐 방지 */
        }

        /* [수정 부분 1] 상단 바 요소들의 정렬과 위치 미세 조정 */

.section { 
    display: flex; 
    align-items: center; 
    gap: 5px; 
    height: 100%; /* 부모 높이에 맞춰 정렬 기준을 잡습니다 */
}

/* 텍스트(아이디:, 대기 중 등) 스타일 */
span {
    display: inline-flex;
    align-items: center;
    line-height: 1;
    font-size: 14px;
}

/* 입력창과 버튼: 모서리 둥글게, 아주 얇은 테두리 적용 */
        input, button {
            height: 21px; 
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            transform: translateY(-1px);
            
            /* 추가/수정된 디자인 */
            border-radius: 6px; /* 모서리 둥글게 */
            border: 1px solid rgba(255, 255, 255, 0.3); /* 아주 얇은 테두리 느낌 */
            padding: 0 10px;
        }

        input { 
            background: white; 
            color: black; 
            border: 1px solid #ddd; /* 입력창은 좀 더 또렷한 선 */
        }

        button {
            border: 1px solid rgba(0, 0, 0, 0.1); /* 버튼 테두리 */
        }

/* 아이콘 전용: 위로 1px 올리고 오른쪽 여백 추가 */
.icon-svg {
    transform: translateY(-1px);
    margin-right: 2px;
}

        /* 버튼 상태 색상 */
        .btn-connect { background: #007bff; color: white; } /* 연결 (파랑) */
        .btn-disconnect { background: #6c757d; color: white; } /* 해제 (회색) */

        #status-display { font-weight: bold; margin-left: 5px; }
        #timer-display { color: #ffeb3b; font-weight: bold; margin-left: 3px; }

        /* 3. 전체 화면 지도 */
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* 4. 모바일 최적화 */
        @media (max-width: 600px) {
            #control-bar { padding: 8px; gap: 5px; }
            input { width: 78px; padding: 0 4px; } 
            span { font-size: 12px; height: 26px; } 
            input, button { height: 21px; font-size: 12px; } /* 모바일도 높이 21px로 축소 */
            #control-bar .section:first-child span:first-child { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <div class="section">
            <span style="font-weight: 900; color: #ffeb3b; margin-right: 8px; display: inline-flex; align-items: center; gap: 4px;">
                <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2 C7.58 2 4 5.58 4 10 C4 15.25 12 22 12 22 C12 22 20 15.25 20 10 C20 5.58 16.42 2 12 2 Z" fill="#1E88FF"/>
                    <circle cx="12" cy="10" r="3.5" fill="#FFFFFF"/>
                </svg>
                AI LTS
            </span>
            <span>아이디:</span>
            <input type="text" id="child-id" placeholder="KID01">
            <button id="btn-toggle" class="btn-connect" onclick="toggleConnection()">연결</button>
        </div>

        <div class="section">
            <span id="status-display">대기 중</span>
            <span id="timer-display"></span>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 파이어베이스 설정 (기존 정보 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyB2Gkfi4bqVtBXO-a2dN3Bq8UN9DCczrb8",
            authDomain: "childtracker-ceec9.firebaseapp.com",
            databaseURL: "https://childtracker-ceec9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "childtracker-ceec9",
            storageBucket: "childtracker-ceec9.firebasestorage.app",
            messagingSenderId: "45166870569",
            appId: "1:45166870569:web:f6879138c465c13eeb5c38"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 카카오맵 초기화
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(35.8714, 128.6014), // 대구광역시 중심
            level: 5 // 확대 레벨
        };
        const map = new kakao.maps.Map(mapContainer, mapOption);
        
        // 줌 컨트롤러 추가
        const zoomControl = new kakao.maps.ZoomControl();
        map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

        let marker = null;
        let infowindow = null; // 배터리 표시 팝업창 (CustomOverlay 객체 담김)
        let currentChildId = "";
        let timerInterval = null;
        let timeLeft = 600;
        let disconnectTimer = null; // [추가] 데이터 수신 중단 감지 타이머
        let lastLat = null;       // 마지막 위도 저장
        let lastLng = null;       // 마지막 경도 저장
        let stagnationTimer = null; // 미이동 감지 타이머
        let hasShownStagnationAlert = false; // 팝업 중복 방지 플래그

        let isListenersAttached = false; // 중복 실행 방지용

        // 1. 연결 버튼 클릭 시 앱 상태 확인 및 토글 함수
        function toggleConnection() {
            const btn = document.getElementById('btn-toggle');
            const inputId = document.getElementById('child-id').value.trim();
            
            if (!inputId) return alert("아이디를 입력하세요.");
            currentChildId = inputId;
            
            if (btn.innerText === "연결") {
                // [수정] 파이어베이스에서 해당 아이디의 데이터를 먼저 조회합니다.
                database.ref('children/' + currentChildId).once('value', (snapshot) => {
                    const data = snapshot.val();
                    
                    // 앱이 한 번도 실행되지 않았거나 데이터가 아예 없는 경우
                    if (!data) {
                        alert("연결 실패: 앱이 실행되고 있지 않거나 아이디가 올바르지 않습니다.");
                        return; // 여기서 함수를 종료하여 타이머 및 리스너가 작동하지 않음
                    }

                    // 앱이 과거에 실행된 적은 있지만, 현재 살아있는지 추가 확인 (선택 사항)
                    // 현재 앱 구조상 데이터가 존재하면 일단 실행 중으로 간주하고 연결을 시도합니다.

                    // 검증 통과 시에만 리스너를 달고 추적 상태를 'on'으로 변경
                    if (!isListenersAttached) {
                        listenToLocation();
                        listenToStatus();
                        isListenersAttached = true;
                    }
                    
                    // 상태를 on으로 바꿔야 listenToStatus에서 타이머가 시작됩니다.
                    setTracking('on');
                });
            } else {
                // 해제 버튼을 누른 경우는 즉시 중지 처리
                setTracking('off');
            }
        }

        // 2. 상태 전송 로직 유지
        function setTracking(status) {
            if (!currentChildId) return alert("아이디 연결을 먼저 해주세요.");
            database.ref('children/' + currentChildId + '/status').set(status);
        }

        // 3. 상태 변화를 감지하여 UI(버튼 모양, 글자)를 자동으로 바꿔주는 로직
        function listenToStatus() {
            database.ref('children/' + currentChildId + '/status').on('value', (snapshot) => {
                const status = snapshot.val();
                const btn = document.getElementById('btn-toggle');
                
                if (status === 'on') {
                    document.getElementById('status-display').innerText = "위치 추적 중";
                    document.getElementById('status-display').style.color = "#ff4d4d";
                    if (btn) {
                        btn.innerText = "해제";
                        btn.className = "btn-disconnect"; // 회색으로 변경
                    }
                    startTimer();
                } else {
                    document.getElementById('status-display').innerText = "추적 중지";
                    document.getElementById('status-display').style.color = "white";
                    if (btn) {
                        btn.innerText = "연결";
                        btn.className = "btn-connect"; // 다시 파란색으로 변경
                    }
                    stopTimer();
                }
            });
        }

        function listenToLocation() {
            database.ref('children/' + currentChildId).on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    // 1. 연결 해제(앱 종료) 감지 타이머 (30초)
                    clearTimeout(disconnectTimer);
                    disconnectTimer = setTimeout(() => {
                        alert("앱과의 연결이 해제되었습니다.");
                        setTracking('off');
                    }, 30000);

                    const lat = data.lat || data.latitude;
                    const lng = data.lng || data.longitude;
                    
                    if (lat && lng) {
                        const moveLatLon = new kakao.maps.LatLng(Number(lat), Number(lng));
                        
                        // 2. 위치 미이동 감지 로직
                        if (lat === lastLat && lng === lastLng) {
                            // 좌표가 이전과 똑같을 때
                            if (!stagnationTimer && !hasShownStagnationAlert) {
                                stagnationTimer = setTimeout(() => {
                                    alert("얼마 동안 위치 이동이 없습니다.");
                                    hasShownStagnationAlert = true; // 이동 전까지 한 번만 띄움
                                }, 30000); // 30초 동안 이동 없을 시 팝업
                            }
                        } else {
                            // 좌표가 변했을 때 (이동 중)
                            clearTimeout(stagnationTimer);
                            stagnationTimer = null;
                            hasShownStagnationAlert = false; // 플래그 초기화
                            
                            // 이동이 확인되면 지도 및 마커 갱신
                            map.setLevel(2); 
                            map.panTo(moveLatLon); 

                            if (marker) {
                                marker.setPosition(moveLatLon);
                            } else {
                                marker = new kakao.maps.Marker({ position: moveLatLon });
                                marker.setMap(map);
                            }
                            lastLat = lat; // 현재 좌표 저장
                            lastLng = lng;
                        }

                        // 배터리 정보 표시 (기존 유지)
                        if (infowindow) infowindow.setMap(null); 
                        const batteryLevel = data.battery !== undefined ? data.battery : '--';
                        infowindow = new kakao.maps.CustomOverlay({
                            map: map,
                            position: moveLatLon,
                            content: `<div style="font-size: 14px; font-weight: bold; color: black; font-family: 'NexonLv2Gothic'; text-align: center; white-space: nowrap; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">배터리: ${batteryLevel}%</div>`,
                            yAnchor: 3.2 
                        });
                    }
                }
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 600;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    setTracking('off');
                    alert("10분이 경과하여 추적을 자동으로 종료합니다.");
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').innerText = "";
        }

        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
        }
    </script>
</body>
</html>
